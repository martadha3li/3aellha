<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الإدارة | منصة العائلة</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; direction: rtl; }
        .login-box { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 90%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; outline: none; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 14px; background: var(--ios-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        .back-link { display: block; margin-top: 20px; color: #8e8e93; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 style="margin-bottom: 5px;">دخول لوحة التحكم</h2>
    <p style="color: #8e8e93; font-size: 13px; margin-bottom: 20px;">خاص بمدير المنصة فقط</p>
    
    <input type="text" id="adminUser" placeholder="اسم المستخدم">
    <input type="password" id="adminPass" placeholder="كلمة المرور">
    
    <button onclick="handleAdminLogin()">تسجيل الدخول</button>
    <a href="news.html" class="back-link">← العودة للأخبار العامة</a>
</div>

<script type="module">
    import { db } from './config.js';
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.handleAdminLogin = async () => {
        const userInp = document.getElementById('adminUser').value.trim();
        const passInp = document.getElementById('adminPass').value.trim();

        const adminRef = doc(db, "AdminSettings", "credentials");
        let adminSnap = await getDoc(adminRef);

        if (!adminSnap.exists()) {
            await setDoc(adminRef, { username: "admin", password: "admin" });
            adminSnap = await getDoc(adminRef);
        }

        const adminData = adminSnap.data();

        if (userInp === adminData.username && passInp === adminData.password) {
            localStorage.setItem('role', 'admin');
            alert("مرحباً بك أيها المدير! تم الدخول بنجاح.");
            window.location.href = "news.html";
        } else {
            alert("اسم المستخدم أو كلمة المرور غير صحيحة!");
        }
    };
</script>
</body>
</html>
