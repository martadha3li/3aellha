<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة خبر جديد | لوحة التحكم</title>
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --ios-bg: #F2F2F7; 
            --card-bg: #FFFFFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; padding: 20px; direction: rtl; display: flex; flex-direction: column; align-items: center; }
        .form-card { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); width: 100%; max-width: 450px; box-sizing: border-box; border: 0.5px solid #dbdbdb; }
        h2 { font-size: 20px; color: #1c1c1e; text-align: center; margin-top: 0; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; text-align: right; }
        .input-group label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 6px; padding-right: 4px; font-weight: 600; }
        input[type="text"], textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 14px; box-sizing: border-box; outline: none; font-size: 15px; background: #fafafa; }
        input[type="text"]:focus, textarea:focus { border-color: var(--ios-blue); background: #fff; }
        textarea { height: 120px; resize: none; }
        
        .file-upload-box { border: 2px dashed #007AFF; background: rgba(0, 122, 255, 0.03); border-radius: 14px; text-align: center; cursor: pointer; margin-bottom: 12px; position: relative; width: 100%; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .file-upload-box span { color: var(--ios-blue); font-size: 14px; font-weight: bold; padding: 20px; z-index: 2; pointer-events: none; }
        #imagePreview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1; }
        
        /* لوحة مراقبة الحجم */
        .size-info-panel { display: none; background: #fafafa; padding: 12px; border-radius: 14px; border: 1px solid #eee; margin-bottom: 15px; font-size: 13px; text-align: right; }
        .size-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .size-row:last-child { margin-bottom: 0; }
        .status-badge { font-weight: bold; padding: 2px 8px; border-radius: 20px; font-size: 11px; color: white; }
        .status-success { background-color: var(--ios-green); }
        .status-error { background-color: var(--ios-red); }

        /* زر الضغط المستقل */
        .btn-compress { width: 100%; padding: 12px; background: #5856D6; color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 14px; cursor: pointer; margin-bottom: 18px; display: none; transition: 0.2s; }
        .btn-compress:active { transform: scale(0.98); }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-right: 4px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { font-size: 14px; color: #1c1c1e; font-weight: bold; cursor: pointer; }
        
        .btn-publish { width: 100%; padding: 15px; background: var(--ios-blue); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-publish:disabled { background-color: #aeaeb2; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #8e8e93; text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>📝 نشر خبر عائلي جديد</h2>
    
    <div class="input-group">
        <label>عنوان الخبر</label>
        <input type="text" id="postTitle" placeholder="اكتب عنواناً معبراً للخبر...">
    </div>
    
    <div class="input-group">
        <label>تفاصيل ونص الخبر</label>
        <textarea id="postContent" placeholder="اكتب تفاصيل الخبر هنا..."></textarea>
    </div>
    
    <div class="file-upload-box" id="uploadBox">
        <span id="uploadStatus">📸 اضغط هنا لإرفاق صورة الخبر</span>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <img id="imagePreview" alt="معاينة الصورة">
    </div>

    <div class="size-info-panel" id="sizePanel">
        <div class="size-row">
            <span>الحجم المتاح بالنظام:</span>
            <strong>1000 KB (1 MB)</strong>
        </div>
        <div class="size-row">
            <span>حجم الصورة الحالية:</span>
            <strong id="currentSizeText">0 KB</strong>
        </div>
        <div class="size-row">
            <span>حالة حجم الصورة:</span>
            <span id="statusBadge" class="status-badge">جاري الفحص...</span>
        </div>
    </div>

    <button class="btn-compress" id="compressBtn">🗜️ ضغط وتقليص حجم الصورة لتتوافق مع النظام</button>

    <div class="checkbox-group">
        <input type="checkbox" id="isPinned">
        <label for="isPinned">📌 تثبيت هذا الخبر في أعلى المنصة</label>
    </div>
    
    <button class="btn-publish" id="publishBtn">🚀 نشر الخبر الآن</button>
    <a href="news.html" class="back-link">← العودة لساحة الأخبار العامة</a>
</div>

<script type="module">
    import { db } from './config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    if (localStorage.getItem('role') !== 'admin') {
        alert("تنبيه: هذه الصفحة مخصصة للإدارة فقط!");
        window.location.href = "news.html";
    }

    let finalImageBase64 = "";
    let originalImageObj = null;
    
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const imagePreview = document.getElementById('imagePreview');
    const uploadStatus = document.getElementById('uploadStatus');
    const sizePanel = document.getElementById('sizePanel');
    const currentSizeText = document.getElementById('currentSizeText');
    const statusBadge = document.getElementById('statusBadge');
    const compressBtn = document.getElementById('compressBtn');
    const publishBtn = document.getElementById('publishBtn');

    uploadBox.addEventListener('click', () => fileInput.click());

    // فحص الحجم المبدئي فور اختيار الصورة من الاستوديو
    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const fileSizeInKB = Math.round(file.size / 1024);
            currentSizeText.innerText = fileSizeInKB + " KB";
            sizePanel.style.display = "block";

            const reader = new FileReader();
            uploadStatus.innerText = "جاري قراءة الملف... ⏳";
            
            reader.onload = function(e) {
                finalImageBase64 = e.target.result;
                
                originalImageObj = new Image();
                originalImageObj.src = e.target.result;

                imagePreview.src = finalImageBase64;
                imagePreview.style.display = "block";
                uploadStatus.innerText = "🔄 تغيير الصورة";
                uploadStatus.style.background = "rgba(255,255,255,0.85)";

                if (fileSizeInKB <= 1000) {
                    statusBadge.innerText = "مقبول بالنظام 🟢";
                    statusBadge.className = "status-badge status-success";
                    compressBtn.style.display = "none";
                    publishBtn.disabled = false;
                } else {
                    statusBadge.innerText = "أعلى من المتاح 🔴";
                    statusBadge.className = "status-badge status-error";
                    compressBtn.style.display = "block";
                    publishBtn.disabled = true;
                    alert("⚠️ حجم الصورة كبير جداً ومرفوض، يرجى الضغط على زر '🗜️ ضغط وتقليص حجم الصورة' بالأسفل لتصغيرها فوراً.");
                }
            };
            reader.readAsDataURL(file);
        }
    });

    // تنفيذ عملية القص والضغط من خلال الـ Canvas
    compressBtn.addEventListener('click', () => {
        if (!originalImageObj) return;
        uploadStatus.innerText = "جاري تنفيذ عملية الضغط... 🗜️";
        
        const canvas = document.createElement('canvas');
        const size = 500; // حجم مربع ومثالي وموفر للمساحة وسريع للنشر
        canvas.width = size;
        canvas.height = size;
        
        const ctx = canvas.getContext('2d');
        let srcX = 0, srcY = 0, srcWidth = originalImageObj.width, srcHeight = originalImageObj.height;
        if (originalImageObj.width > originalImageObj.height) {
            srcWidth = originalImageObj.height;
            srcX = (originalImageObj.width - originalImageObj.height) / 2;
        } else {
            srcHeight = originalImageObj.width;
            srcY = (originalImageObj.height - originalImageObj.width) / 2;
        }
        
        ctx.drawImage(originalImageObj, srcX, srcY, srcWidth, srcHeight, 0, 0, size, size);
        
        // ضغط جودة بكسل الصورة إلى 60% لتصغير الحجم بشكل هائل وضمان النشر الفوري
        finalImageBase64 = canvas.toDataURL('image/jpeg', 0.6); 
        imagePreview.src = finalImageBase64;
        
        const stringLength = finalImageBase64.length - 'data:image/jpeg;base64,'.length;
        const compressedSizeInKB = Math.round((stringLength * 3) / 4 / 1024);
        
        currentSizeText.innerText = compressedSizeInKB + " KB (تم الضغط بنجاح)";
        statusBadge.innerText = "مقبول الآن 🟢";
        statusBadge.className = "status-badge status-success";
        
        uploadStatus.innerText = "✅ تم الضغط والتربيع";
        compressBtn.style.display = "none";
        publishBtn.disabled = false;
    });

    // دالة النشر النهائية المحدثة لـ Firebase لمنع التعليق
    publishBtn.addEventListener('click', async () => {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const isPinned = document.getElementById('isPinned').checked;

        if (!title) return alert("يرجى كتابة عنوان الخبر أولاً");
        if (!content) return alert("يرجى كتابة نص ومحتوى الخبر");
        if (!finalImageBase64) return alert("يرجى إرفاق صورة للخبر");

        publishBtn.innerText = "جاري النشر والمزامنة... ⏳";
        publishBtn.disabled = true;

        try {
            // صياغة الكولكشن المضمونة والآمنة للاتصال بقاعدة البيانات السحابية
            const newsCollectionRef = collection(db, "News");
            
            await addDoc(newsCollectionRef, {
                title: title,
                content: content,
                img: finalImageBase64,
                pinned: isPinned,
                publishDate: Number(Date.now()) // تمرير التاريخ كـ Number صريح
            });

            // نافذة التأكيد المطلوبة تظهر فور نجاح الإرسال والـ Response
            alert("تم نشر الخبر بنجاح! 🎉");
            
            // الانتقال الفوري والمباشر لساحة الأخبار
            window.location.href = "news.html";

        } catch (error) {
            // التقاط أي خطأ من خوادم الفايربيس (مثل الـ Rules المرفوضة) وطباعته للشاشة لمنع التعليق
            console.error("Firebase Execution Error:", error);
            alert("فشل النشر! خطأ من قاعدة البيانات: " + error.message);
            
            publishBtn.innerText = "🚀 نشر الخبر الآن";
            publishBtn.disabled = false;
        }
    });
</script>
</body>
</html>
