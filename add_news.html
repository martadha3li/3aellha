<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أخبار العائلة | التايم لاين الكلاسيكي</title>
    <style>
        :root {
            --ios-blue: #007AFF; 
            --ios-bg: #F2F2F7;
            --card-bg: #FFFFFF; 
            --text-main: #1c1c1e; 
            --text-sec: #8E8E93;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --gold-bg: #fff9e6; 
            --gold-border: #d4af37;
        }

        body { 
            background-color: var(--ios-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            margin: 0; 
            padding-top: 80px; 
            padding-bottom: 100px; 
            direction: rtl;
            position: relative;
        }

        /* شريط التحديث التسلسلي الموحد */
        .version-badge { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-size: 11px; 
            font-weight: 800; 
            background: #e5e5ea; 
            color: #555; 
            padding: 4px 8px; 
            border-radius: 8px; 
            direction: ltr; 
            z-index: 500000; 
        }

        #pinnedArea { margin-bottom: 15px; display: none; }
        .pin-card { background: var(--gold-bg); border: 1px solid var(--gold-border); padding: 12px; border-radius: 15px; margin: 0 15px 10px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        /* تصميم كرت الأخبار الطولي الكلاسيكي الأصلي للمنصة */
        .post-card { 
            background: var(--card-bg); 
            margin: 12px 15px; 
            border-radius: 16px; 
            display: flex; 
            padding: 12px; 
            gap: 15px; 
            box-shadow: var(--shadow); 
            align-items: center; 
            cursor: pointer; 
            border: 0.5px solid #e5e5ea; 
            position: relative; 
        }
        .post-image-container { 
            width: 75px; 
            height: 75px; 
            flex-shrink: 0; 
        }
        .post-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 12px; 
            background: #eee; 
        }
        .post-info { 
            flex: 1; 
            min-width: 0; 
        }
        .post-title { 
            margin: 0 0 6px 0; 
            font-size: 15px; 
            font-weight: 700; 
            color: var(--text-main); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .post-meta { 
            display: flex; 
            gap: 12px; 
            font-size: 11px; 
            color: var(--text-sec); 
        }

        /* نافذة المودال المنبثقة الكلاسيكية لعرض تفاصيل الخبر بالكامل */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 600000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 25px; max-height: 85vh; overflow-y: auto; position: relative; animation: popIn 0.3s ease; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { position: sticky; top: 0; background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .close-modal { font-size: 24px; cursor: pointer; color: #999; border: none; background: none; }

        .dropdown { position: absolute; left: 15px; top: 45px; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; flex-direction: column; z-index: 100; border: 1px solid #eee; overflow: hidden; }
        .dropdown button { padding: 12px 15px; border: none; background: none; text-align: right; font-size: 13px; border-bottom: 0.5px solid #f2f2f2; width: 140px; cursor: pointer; }

        .admin-floating-btn { position: fixed; bottom: 30px; left: 20px; width: 55px; height: 55px; background: var(--ios-blue); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,122,255,0.3); z-index: 500000; cursor: pointer; }
        #visitorLoginBtn { position: fixed; bottom: 30px; left: 20px; width: 50px; height: 50px; background: #e5e5ea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 500000; }
    </style>
</head>
<body>

    <div class="version-badge">Ver: 206-4</div>

    <div class="feed-container">
        <div id="pinnedArea"></div>
        <div id="newsFeed"></div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight: bold; color: var(--ios-blue);">تفاصيل الخبر العائلي</span>
                <button class="close-modal" id="closeModalBtn">✕</button>
            </div>
            <div id="modalBody" style="padding: 20px;"></div>
        </div>
    </div>

    <div class="admin-floating-btn" id="adminBtn">⚙️</div>
    <div id="visitorLoginBtn" onclick="window.location.href='login.html'">🔑</div>

    <script type="module" src="header.js"></script>
    <script type="module" src="navbar.js"></script>

<script type="module">
    import { db } from './config.js';
    import { collection, onSnapshot, doc, getDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const isAdmin = localStorage.getItem('role') === 'admin';
    const adminBtn = document.getElementById('adminBtn');
    const visitorLoginBtn = document.getElementById('visitorLoginBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const postModal = document.getElementById('postModal');

    if (isAdmin) {
        adminBtn.style.display = 'flex';
        visitorLoginBtn.style.display = 'none';
        adminBtn.addEventListener('click', () => window.location.href = 'add_news.html');
    }

    // [نظام الـ Subscription الكلاسيكي الأصلي للمنصة]
    function loadClassicPostsFeed() {
        onSnapshot(query(collection(db, "News"), orderBy("publishDate", "desc")), (snap) => {
            const feed = document.getElementById('newsFeed');
            const pinnedArea = document.getElementById('pinnedArea');
            
            feed.innerHTML = ""; 
            pinnedArea.innerHTML = "";

            snap.forEach(docSnap => {
                const post = docSnap.data();
                const postId = docSnap.id;

                // التعامل مع الأخبار المثبتة الكلاسيكية
                if (post.pinned === true || post.isPinned === true) {
                    const pinCard = document.createElement('div');
                    pinCard.className = "pin-card";
                    pinCard.addEventListener('click', () => showPostFull(postId));
                    pinCard.innerHTML = `📌 <b style="font-size:13px; color:#856404; margin-right:5px; flex:1;">${post.title || "منشور مثبت"}</b> <span style="font-size:11px; color:#856404;">عرض ←</span>`;
                    pinnedArea.appendChild(pinCard);
                }

                // بناء بطاقات التايم لاين الطولية الأصلية الخفيفة والمستقرة
                const card = document.createElement('div');
                card.className = "post-card";
                card.addEventListener('click', () => showPostFull(postId));
                
                let formattedDate = "قبل قليل";
                if (post.publishDate) {
                    const dateObj = typeof post.publishDate === 'number' ? new Date(post.publishDate) : (post.publishDate.seconds ? new Date(post.publishDate.seconds * 1000) : new Date(post.publishDate));
                    formattedDate = dateObj.toLocaleDateString('ar-SA', { day: 'numeric', month: 'short' });
                }

                card.innerHTML = `
                    <div class="post-image-container">
                        <img class="post-image" src="${post.img || post.image || 'logo.png'}" onerror="this.src='https://via.placeholder.com/150?text=News'">
                    </div>
                    <div class="post-info">
                        <h2 class="post-title">${post.title || "خبر جديد"}</h2>
                        <div class="post-meta">
                            <span>📅 ${formattedDate}</span>
                            <span>📖 تفاصيل الخبر</span>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <div style="position:relative">
                        <div class="drop-trigger" data-id="${postId}" style="padding:10px; color:#ccc; font-weight:bold;">⋮</div>
                        <div id="drop-${postId}" class="dropdown">
                            <button class="del-btn" data-id="${postId}" style="color:red">🗑️ حذف الخبر</button>
                        </div>
                    </div>` : ''}
                `;
                feed.appendChild(card);
            });
            
            pinnedArea.style.display = pinnedArea.innerHTML === "" ? "none" : "block";
            bindAdminClassicEvents();
        });
    }

    function bindAdminClassicEvents() {
        if (!isAdmin) return;
        document.querySelectorAll('.drop-trigger').forEach(trigger => {
            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = trigger.getAttribute('data-id');
                document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
                document.getElementById(`drop-${id}`).style.display = 'flex';
            });
        });

        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const id = btn.getAttribute('data-id');
                if(confirm("هل تريد بالتأكيد حذف هذا الخبر نهائياً؟")) {
                    await deleteDoc(doc(db, "News", id));
                }
            });
        });
    }

    // دالة فتح وعرض الخبر الكلاسيكي بالكامل داخل المودال
    async function showPostFull(id) {
        const snap = await getDoc(doc(db, "News", id));
        if (snap.exists()) {
            const post = snap.data();
            document.getElementById('modalBody').innerHTML = `
                ${(post.img || post.image) ? `<img src="${post.img || post.image}" style="width:100%; border-radius:15px; margin-bottom:15px; max-height:25px; object-fit:cover;">` : ''}
                <h3 style="margin: 0 0 10px 0; color:var(--text-main); font-size:18px;">${post.title || "تفاصيل الخبر"}</h3>
                <p style="font-size:14px; color:#444; line-height:1.7; white-space:pre-line;">${post.content || post.body || 'لا توجد تفاصيل إضافية مكتوبة لهذا الخبر.'}</p>
            `;
            postModal.style.display = 'flex';
        }
    }

    closeModalBtn.addEventListener('click', () => postModal.style.display = 'none');
    postModal.addEventListener('click', (e) => { if(e.target === postModal) postModal.style.display = 'none'; });
    document.addEventListener('click', () => document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none'));

    // بدء تشغيل اشتراك جلب البيانات الفوري المستقر
    loadClassicPostsFeed();
</script>
</body>
</html>
