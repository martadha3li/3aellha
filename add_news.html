<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة خبر جديد | لوحة التحكم</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; --card-bg: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; padding: 20px; direction: rtl; display: flex; flex-direction: column; align-items: center; }
        .form-card { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); width: 100%; max-width: 450px; box-sizing: border-box; border: 0.5px solid #dbdbdb; }
        h2 { font-size: 20px; color: #1c1c1e; text-align: center; margin-top: 0; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; text-align: right; }
        .input-group label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 6px; padding-right: 4px; font-weight: 600; }
        input[type="text"], textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 14px; box-sizing: border-box; outline: none; font-size: 15px; background: #fafafa; }
        input[type="text"]:focus, textarea:focus { border-color: var(--ios-blue); background: #fff; }
        textarea { height: 120px; resize: none; }
        
        .file-upload-box { border: 2px dashed #007AFF; background: rgba(0, 122, 255, 0.03); border-radius: 14px; text-align: center; cursor: pointer; margin-bottom: 18px; position: relative; width: 100%; aspect-ratio: 1 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .file-upload-box span { color: var(--ios-blue); font-size: 14px; font-weight: bold; padding: 20px; z-index: 2; pointer-events: none; }
        #imagePreview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1; }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-right: 4px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { font-size: 14px; color: #1c1c1e; font-weight: bold; cursor: pointer; }
        .btn-publish { width: 100%; padding: 15px; background: var(--ios-blue); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-publish:disabled { background-color: #aeaeb2; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #8e8e93; text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>📝 نشر خبر عائلي جديد</h2>
    
    <div class="input-group">
        <label>عنوان الخبر</label>
        <input type="text" id="postTitle" placeholder="اكتب عنواناً معبراً للخبر...">
    </div>
    
    <div class="input-group">
        <label>تفاصيل ونص الخبر</label>
        <textarea id="postContent" placeholder="اكتب تفاصيل الخبر هنا..."></textarea>
    </div>
    
    <div class="file-upload-box" id="uploadBox">
        <span id="uploadStatus">📸 اضغط هنا لإرفاق صورة الخبر</span>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <img id="imagePreview" alt="معاينة الصورة">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="isPinned">
        <label for="isPinned">📌 تثبيت هذا الخبر في أعلى المنصة</label>
    </div>
    
    <button class="btn-publish" id="publishBtn">🚀 نشر الخبر الآن</button>
    <a href="news.html" class="back-link">← العودة لساحة الأخبار العامة</a>
</div>

<script type="module">
    import { db } from './config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    if (localStorage.getItem('role') !== 'admin') {
        alert("تنبيه: هذه الصفحة مخصصة للإدارة فقط!");
        window.location.href = "news.html";
    }

    let compressedImageBase64 = "";
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const imagePreview = document.getElementById('imagePreview');
    const uploadStatus = document.getElementById('uploadStatus');
    const publishBtn = document.getElementById('publishBtn');

    uploadBox.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            uploadStatus.innerText = "جاري معالجة وضغط الصورة... ⏳";
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // استخدام Canvas لقص وضغط الصورة إلى مقاس مربع متناسق (600x600 بكسل كحد أقصى)
                    const canvas = document.createElement('canvas');
                    const size = 600; 
                    canvas.width = size;
                    canvas.height = size;
                    
                    const ctx = canvas.getContext('2d');
                    
                    // منطق احترافي لقص الصورة من المنتصف لتبدو مربعة بدون تمطيط
                    let srcX = 0, srcY = 0, srcWidth = img.width, srcHeight = img.height;
                    if (img.width > img.height) {
                        srcWidth = img.height;
                        srcX = (img.width - img.height) / 2;
                    } else {
                        srcHeight = img.width;
                        srcY = (img.height - img.width) / 2;
                    }
                    
                    ctx.drawImage(img, srcX, srcY, srcWidth, srcHeight, 0, 0, size, size);
                    
                    // تحويل الصورة المقصوصة إلى Base64 مع ضغط الجودة بنسبة 70% لتصغير الحجم بشكل هائل
                    compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // عرض المعاينة الفورية للمستخدم
                    imagePreview.src = compressedImageBase64;
                    imagePreview.style.display = "block";
                    
                    uploadStatus.style.background = "rgba(255,255,255,0.85)";
                    uploadStatus.style.borderRadius = "8px";
                    uploadStatus.style.padding = "8px 12px";
                    uploadStatus.innerText = "🔄 تغيير الصورة المرفقة";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    publishBtn.addEventListener('click', async () => {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const isPinned = document.getElementById('isPinned').checked;

        if (!title) return alert("يرجى كتابة عنوان الخبر أولاً");
        if (!content) return alert("يرجى كتابة نص ومحتوى الخبر");
        if (!compressedImageBase64) return alert("يرجى إرفاق صورة للخبر ليطابق ستايل الإنستغرام");

        publishBtn.innerText = "جاري النشر والمزامنة... ⏳";
        publishBtn.disabled = true;

        try {
            // إرسال البيانات المجهزة إلى كولكشن News في Firestore
            await addDoc(collection(db, "News"), {
                title: title,
                content: content,
                img: compressedImageBase64, // الصورة المضغوطة والسريعة الآن
                pinned: isPinned,
                publishDate: Date.now()
            });

            // إظهار نافذة التأكيد المطلوبة
            alert("تم نشر الخبر بنجاح! 🎉");
            
            // التوجيه الفوري لصفحة الأخبار والتأكد من تحديث الجلسة
            window.location.replace("news.html");

        } catch (error) {
            console.error("Firebase Critical Error:", error);
            alert("فشل النشر! السبب محتمل: " + error.message);
            publishBtn.innerText = "🚀 نشر الخبر الآن";
            publishBtn.disabled = false;
        }
    });
</script>
</body>
</html>
