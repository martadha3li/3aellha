<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة خبر جديد | لوحة التحكم</title>
    <style>
        :root { 
            --ios-blue: #007AFF; 
            --ios-bg: #F2F2F7; 
            --card-bg: #FFFFFF;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--ios-bg); 
            margin: 0; 
            padding: 20px; 
            direction: rtl; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            width: 100%; 
            max-width: 450px; 
            box-sizing: border-box;
            border: 0.5px solid #dbdbdb;
        }
        h2 { font-size: 20px; color: #1c1c1e; text-align: center; margin-top: 0; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 18px; text-align: right; }
        .input-group label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 6px; padding-right: 4px; font-weight: 600; }
        
        input[type="text"], textarea { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ddd; 
            border-radius: 14px; 
            box-sizing: border-box; 
            outline: none; 
            font-size: 15px; 
            background: #fafafa;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus { border-color: var(--ios-blue); background: #fff; }
        textarea { height: 120px; resize: none; }
        
        /* زر رفع الصورة المخصص */
        .file-upload-box {
            border: 2px dashed #007AFF;
            background: rgba(0, 122, 255, 0.03);
            padding: 20px;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 18px;
            transition: 0.2s;
        }
        .file-upload-box:active { transform: scale(0.98); background: rgba(0, 122, 255, 0.08); }
        .file-upload-box span { color: var(--ios-blue); font-size: 14px; font-weight: bold; }
        #imagePreview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; border: 1px solid #ddd; }
        
        /* خيار التثبيت */
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-right: 4px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { font-size: 14px; color: #1c1c1e; font-weight: bold; cursor: pointer; }

        .btn-publish { width: 100%; padding: 15px; background: var(--ios-blue); color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-publish:active { transform: scale(0.97); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #8e8e93; text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>📝 نشر خبر عائلي جديد</h2>
    
    <div class="input-group">
        <label>عنوان الخبر</label>
        <input type="text" id="postTitle" placeholder="اكتب عنواناً معبراً للخبر...">
    </div>
    
    <div class="input-group">
        <label>تفاصيل ونص الخبر</label>
        <textarea id="postContent" placeholder="اكتب تفاصيل الخبر هنا بالتفصيل..."></textarea>
    </div>
    
    <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
        <span id="uploadStatus">📸 اضغط هنا لإرفاق صورة الخبر</span>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewAndConvertImage(this)">
        <img id="imagePreview" alt="معاينة الصورة المرفقة">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="isPinned">
        <label for="isPinned">📌 تثبيت هذا الخبر في أعلى المنصة</label>
    </div>
    
    <button class="btn-publish" id="publishBtn" onclick="handlePublish()">🚀 نشر الخبر الآن</button>
    
    <a href="news.html" class="back-link">← العودة لساحة الأخبار العامة</a>
</div>

<script type="module">
    import { db } from './config.js';
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // التحقق الفوري من صلاحية المستخدم (يجب أن يكون المسجل هو الأدمن)
    if (localStorage.getItem('role') !== 'admin') {
        alert("تنبيه: هذه الصفحة مخصصة للإدارة فقط!");
        window.location.href = "news.html";
    }

    let base64ImageString = "";

    // دالة معاينة الصورة وتحويلها فورياً لـ Base64 لسهولة التخزين
    window.previewAndConvertImage = (input) => {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            document.getElementById('uploadStatus').innerText = "جاري تجهيز الصورة... ⏳";
            
            reader.onload = function(e) {
                base64ImageString = e.target.result; // الحصول على كود الصورة المشفر
                const preview = document.getElementById('imagePreview');
                preview.src = base64ImageString;
                preview.style.display = "block";
                document.getElementById('uploadStatus').innerText = "✅ تم إرفاق الصورة بنجاح";
            };
            reader.readAsDataURL(file);
        }
    };

    // دالة رفع ونشر الخبر إلى الفايربيس للظهور فوراً بالاشتراك الحي
    window.handlePublish = async () => {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const isPinned = document.getElementById('isPinned').checked;
        const btn = document.getElementById('publishBtn');

        // التحقق من الحقول الأساسية لضمان جودة العرض على ستايل الإنستغرام
        if (!title) return alert("يرجى كتابة عنوان الخبر أولاً");
        if (!content) return alert("يرجى كتابة نص ومحتوى الخبر");
        if (!base64ImageString) return alert("يرجى إرفاق صورة للخبر ليظهر بشكل صحيح متناسق");

        btn.innerText = "جاري النشر والمزامنة... ⏳";
        btn.disabled = true;

        try {
            // إضافة البيانات في مجموعة News بنفس الحقول التي تبحث عنها صفحة التايم لاين المحدثة
            await addDoc(collection(db, "News"), {
                title: title,
                content: content,
                img: base64ImageString, // تخزين كود الصورة المباشر ليعمل بالـ Subscription فوراً
                pinned: isPinned,
                publishDate: serverTimestamp() // إضافة التوقيت الرسمي للفايربيس لفرز المنشورات تنازلياً
            });

            alert("تم نشر الخبر بنجاح! 🎉 سيظهر الآن في التايم لاين لجميع أفراد العائلة فوراً.");
            
            // إعادة تصفير الحقول للاستعداد لنشر خبر آخر
            document.getElementById('postTitle').value = "";
            document.getElementById('postContent').value = "";
            document.getElementById('fileInput').value = "";
            document.getElementById('isPinned').checked = false;
            document.getElementById('imagePreview').style.display = "none";
            document.getElementById('uploadStatus').innerText = "📸 اضغط هنا لإرفاق صورة الخبر";
            base64ImageString = "";

        } catch (error) {
            console.error("Publishing Error:", error);
            alert("حدث خطأ أثناء محاولة النشر، يرجى التحقق من اتصال قاعدة البيانات.");
        } finally {
            btn.innerText = "🚀 نشر الخبر الآن";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
