<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة خبر جديد | Ver: 206-19</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; --card-bg: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background: var(--ios-bg); margin: 0; padding: 20px; direction: rtl; display: flex; flex-direction: column; align-items: center; }
        .version-badge { position: absolute; top: 10px; right: 15px; font-size: 11px; font-weight: 800; background: #e5e5ea; color: #555; padding: 4px 8px; border-radius: 8px; direction: ltr; }
        .form-card { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); width: 100%; max-width: 450px; box-sizing: border-box; border: 0.5px solid #dbdbdb; margin-top: 25px; }
        h2 { font-size: 18px; text-align: center; margin-bottom: 20px; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; background: #fafafa; margin-bottom: 15px; }
        .file-upload-box { border: 2px dashed #007AFF; background: rgba(0, 122, 255, 0.03); border-radius: 14px; text-align: center; cursor: pointer; margin-bottom: 12px; position: relative; width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #imagePreview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; background: var(--ios-blue); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="version-badge">Ver: 206-19</div>

<div class="form-card">
    <h2>📝 نشر خبر عائلي فوري</h2>
    <input type="text" id="postTitle" placeholder="العنوان (اختياري)">
    <textarea id="postContent" placeholder="نص الخبر (اختياري)"></textarea>
    
    <div class="file-upload-box" id="uploadBox">
        <span id="uploadStatus">📸 اضغط هنا لإرفاق صورة الخبر</span>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <img id="imagePreview">
    </div>

    <button class="btn" id="publishBtn">🚀 نشر الخبر الآن</button>
    <a href="news.html" style="display:block; text-align:center; font-size:13px; color:#8e8e93; text-decoration:none; margin-top:10px;">← العودة للأخبار</a>
</div>

<script type="module">
    import { db } from './config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let finalImg = "";
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const preview = document.getElementById('imagePreview');
    const publishBtn = document.getElementById('publishBtn');

    uploadBox.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const imgObj = new Image();
                imgObj.src = ev.target.result;
                imgObj.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 300; canvas.height = 300;
                    const ctx = canvas.getContext('2d');
                    const side = Math.min(imgObj.width, imgObj.height);
                    ctx.drawImage(imgObj, (imgObj.width-side)/2, (imgObj.height-side)/2, side, side, 0, 0, 300, 300);
                    
                    finalImg = canvas.toDataURL('image/jpeg', 0.35);
                    preview.src = finalImg;
                    preview.style.display = "block";
                    document.getElementById('uploadStatus').style.display = "none";
                };
            };
            reader.readAsDataURL(file);
        }
    };

    publishBtn.onclick = async () => {
        if(!finalImg) return alert("يرجى إرفاق صورة أولاً!");
        
        publishBtn.innerText = "جاري الحفظ والمزامنة... ⏳";
        publishBtn.disabled = true;

        try {
            // [الربط بالجدول الصحيح الجديد]: التخزين في كولكشن 3aelh مباشرة
            await addDoc(collection(db, "3aelh"), {
                title: document.getElementById('postTitle').value.trim(),
                content: document.getElementById('postContent').value.trim(),
                img: finalImg,
                publishDate: Date.now()
            });
            window.location.href = "news.html";
        } catch (e) {
            alert("❌ خطأ من السيرفر: " + e.message);
            publishBtn.innerText = "🚀 نشر الخبر الآن";
            publishBtn.disabled = false;
        }
    };
</script>
</body>
</html>
