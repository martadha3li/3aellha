<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إضافة خبر جديد | Ver: 206-5</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; --card-bg: #FFFFFF; --ios-green: #34C759; --ios-red: #FF3B30; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; padding: 20px; direction: rtl; display: flex; flex-direction: column; align-items: center; position: relative; }
        .version-badge { position: absolute; top: 10px; right: 15px; font-size: 11px; font-weight: 800; background: #e5e5ea; color: #555; padding: 4px 8px; border-radius: 8px; direction: ltr; }
        .form-card { background: var(--card-bg); padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); width: 100%; max-width: 450px; box-sizing: border-box; border: 0.5px solid #dbdbdb; margin-top: 25px; }
        h2 { font-size: 18px; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; background: #fafafa; }
        .file-upload-box { border: 2px dashed #007AFF; background: rgba(0, 122, 255, 0.03); border-radius: 14px; text-align: center; cursor: pointer; margin-bottom: 12px; position: relative; width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #imagePreview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        .size-panel { display: none; background: #f8f8f8; padding: 10px; border-radius: 10px; font-size: 12px; margin-bottom: 10px; border: 1px solid #eee; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-compress { background: #5856D6; color: white; display: none; }
        .btn-publish { background: var(--ios-blue); color: white; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="version-badge">Ver: 206-5</div>

<div class="form-card">
    <h2>نشر خبر جديد للمنصة</h2>
    <div class="input-group"><input type="text" id="postTitle" placeholder="العنوان (اختياري)"></div>
    <div class="input-group"><textarea id="postContent" placeholder="نص الخبر (اختياري)"></textarea></div>
    
    <div class="file-upload-box" id="uploadBox">
        <span id="uploadStatus">📸 اضغط هنا لإرفاق صورة الخبر</span>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        <img id="imagePreview">
    </div>

    <div class="size-panel" id="sizePanel">
        الحجم: <strong id="currentSizeText">0 KB</strong> | الحالة: <strong id="statusText">...</strong>
    </div>

    <button class="btn btn-compress" id="compressBtn">🗜️ ضغط وتربيع الصورة للنشر</button>
    <button class="btn btn-publish" id="publishBtn">🚀 نشر الخبر الآن</button>
    <a href="news.html" style="display:block; text-align:center; font-size:13px; color:#8e8e93; text-decoration:none; margin-top:10px;">← العودة للأخبار</a>
</div>

<script type="module">
    import { db } from './config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let finalImg = "";
    let originalImg = null;
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const preview = document.getElementById('imagePreview');
    const publishBtn = document.getElementById('publishBtn');
    const compressBtn = document.getElementById('compressBtn');

    uploadBox.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const kb = Math.round(file.size / 1024);
            document.getElementById('currentSizeText').innerText = kb + " KB";
            document.getElementById('sizePanel').style.display = "block";
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                finalImg = ev.target.result;
                originalImg = new Image();
                originalImg.src = ev.target.result;
                preview.src = ev.target.result;
                preview.style.display = "block";
                
                if(kb > 1000) {
                    document.getElementById('statusText').innerText = "كبير 🔴";
                    compressBtn.style.display = "block";
                    publishBtn.disabled = true;
                } else {
                    document.getElementById('statusText').innerText = "مقبول 🟢";
                    publishBtn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        }
    };

    compressBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 600; canvas.height = 600;
        const ctx = canvas.getContext('2d');
        const side = Math.min(originalImg.width, originalImg.height);
        ctx.drawImage(originalImg, (originalImg.width-side)/2, (originalImg.height-side)/2, side, side, 0,0,600,600);
        finalImg = canvas.toDataURL('image/jpeg', 0.7);
        preview.src = finalImg;
        document.getElementById('statusText').innerText = "تم الضغط 🟢";
        compressBtn.style.display = "none";
        publishBtn.disabled = false;
    };

    publishBtn.onclick = async () => {
        if(!finalImg) return alert("يرجى إرفاق صورة");
        publishBtn.innerText = "جاري الحفظ... ⏳";
        publishBtn.disabled = true;
        try {
            await addDoc(collection(db, "News"), {
                title: document.getElementById('postTitle').value,
                content: document.getElementById('postContent').value,
                img: finalImg,
                publishDate: Date.now()
            });
            alert("تم تخزين الخبر على Firebase بنجاح! 🎉");
            window.location.href = "news.html";
        } catch (e) {
            alert("خطأ: " + e.message);
            publishBtn.disabled = false;
        }
    };
</script>
</body>
</html>
