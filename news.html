<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة أخبار العائلة | التايم لاين</title>
    <style>
        :root {
            --ios-blue: #007AFF; --ios-bg: #F2F2F7;
            --card-bg: #FFFFFF; --text-main: #1c1c1e; --text-sec: #8E8E93;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --gold-bg: #fff9e6; --gold-border: #d4af37;
        }

        body { 
            background-color: var(--ios-bg); font-family: -apple-system, sans-serif; 
            margin: 0; padding-top: 80px; padding-bottom: 100px; direction: rtl;
        }

        #pinnedArea { margin-bottom: 15px; display: none; }
        .pin-card { background: var(--gold-bg); border: 1px solid var(--gold-border); padding: 12px; border-radius: 15px; margin: 0 15px 10px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }

        .post-card { background: var(--card-bg); margin: 8px 15px; border-radius: 12px; display: flex; padding: 8px; gap: 12px; box-shadow: var(--shadow); align-items: center; cursor: pointer; border: 0.5px solid #e5e5ea; position: relative; }
        .post-image-container { width: 55px; height: 55px; flex-shrink: 0; }
        .post-image { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; background: #eee; }
        .post-info { flex: 1; min-width: 0; }
        .post-title { margin: 0; font-size: 14px; font-weight: 700; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .post-meta { display: flex; gap: 10px; margin-top: 4px; font-size: 10px; color: var(--text-sec); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 25px; max-height: 85vh; overflow-y: auto; position: relative; animation: popIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .modal-header { position: sticky; top: 0; background: white; padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .close-modal { font-size: 26px; cursor: pointer; color: #999; border: none; background: none; }

        .comments-section { padding: 15px; background: #f9f9f9; border-top: 1px solid #eee; }
        .comment-item { background: white; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 0.5px solid #eee; }
        .comment-user { font-size: 12px; font-weight: 800; color: var(--ios-blue); display: block; }
        .comment-text { font-size: 13px; color: #333; }
        .comment-input-area { padding: 10px 15px; border-top: 1px solid #eee; display: flex; gap: 8px; background: white; position: sticky; bottom: 0; }
        .comment-input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .comment-send-btn { background: var(--ios-blue); color: white; border: none; padding: 0 18px; border-radius: 20px; font-weight: bold; }

        .admin-only { display: none; }
        .dropdown { position: absolute; left: 10px; top: 40px; background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: none; flex-direction: column; z-index: 100; border: 1px solid #eee; overflow: hidden; }
        .dropdown button { padding: 12px 15px; border: none; background: none; text-align: right; font-size: 12px; border-bottom: 0.5px solid #f2f2f2; width: 140px; cursor: pointer; }

        .admin-floating-btn { position: fixed; bottom: 30px; left: 20px; width: 55px; height: 55px; background: var(--ios-blue); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,122,255,0.4); z-index: 500000; cursor: pointer; }
        #visitorLoginBtn { position: fixed; bottom: 30px; left: 20px; width: 50px; height: 50px; background: #e5e5ea; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 500000; }
        #notifyBox { display: none; background: #fff; padding: 15px; margin: 10px 15px; border-radius: 15px; box-shadow: var(--shadow); align-items: center; justify-content: space-between; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="notifyBox">
        <span style="font-size: 13px; font-weight: bold; color:#333;">🔔 فعل الإشعارات لتصلك أخبار العائلة فوراً على جوالك</span>
        <button onclick="requestNotificationPermission()" style="background:var(--ios-blue); color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">تفعيل</button>
    </div>

    <div class="admin-only" id="adminNotificationPanel" style="background: white; padding: 15px; margin: 10px 15px; border-radius: 15px; box-shadow: var(--shadow);">
        <h4 style="margin:0 0 10px 0;">📣 بث إشعار فوري حي للمنصة</h4>
        <input type="text" id="notifTitle" placeholder="عنوان الإشعار (مثال: بيان عاجل)" style="width:100%; padding:10px; margin-bottom:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <input type="text" id="notifBody" placeholder="نص رسالة الإشعار..." style="width:100%; padding:10px; margin-bottom:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <button onclick="sendLiveNotification()" style="background:#34c759; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">بث الإشعار الآن 🚀</button>
    </div>

    <div id="pinnedArea"></div>
    <div id="newsFeed"></div>

    <div id="postModal" class="modal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span style="font-weight: bold; color: var(--ios-blue);">تفاصيل الخبر</span>
                <button class="close-modal" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody" style="padding: 15px;"></div>
            <div id="commentsContainer" class="comments-section"></div>
            <div id="commentInputArea" class="comment-input-area"></div>
        </div>
    </div>

    <div class="admin-floating-btn" id="adminBtn" onclick="window.location.href='profile.html'">⚙️</div>
    <div id="visitorLoginBtn" onclick="window.location.href='login.html'">🔑</div>

    <script type="module" src="header.js"></script>
    <script type="module" src="navbar.js"></script>

<script type="module">
    import { db } from './config.js';
    import { collection, onSnapshot, doc, getDoc, updateDoc, deleteDoc, arrayUnion, query, orderBy, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const isAdmin = localStorage.getItem('role') === 'admin';

    if (isAdmin) {
        document.getElementById('adminBtn').style.display = 'flex';
        document.getElementById('visitorLoginBtn').style.display = 'none';
        document.getElementById('adminNotificationPanel').style.display = 'block';
    }

    window.requestNotificationPermission = () => {
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                document.getElementById('notifyBox').style.display = 'none';
                localStorage.setItem('notificationsEnabled', 'true');
            }
        });
    };

    if (Notification.permission !== 'granted' && !isAdmin) {
        document.getElementById('notifyBox').style.display = 'flex';
    }

    // --- العودة لنظام الـ Subscription المباشر واللحظي للأشعار ---
    onSnapshot(doc(db, "LiveNotifications", "current"), (snap) => {
        if (snap.exists()) {
            const data = snap.data();
            // تشغيل الإشعار فور حدوث أي تحديث في الدوكيومنت وبشرط حداثة التوقيت (آخر 10 ثواني)
            if (data.timestamp > (Date.now() - 10000) && Notification.permission === 'granted') {
                new Notification(data.title, { body: data.body, icon: 'logo.png' });
            }
        }
    });

    window.sendLiveNotification = async () => {
        const title = document.getElementById('notifTitle').value.trim();
        const body = document.getElementById('notifBody').value.trim();
        if(!title || !body) return alert("أدخل بيانات الإشعار");

        await setDoc(doc(db, "LiveNotifications", "current"), {
            title: title,
            body: body,
            timestamp: Date.now() // التحديث الفوري لتشغيل الـ Subscription
        });
        alert("تم بث الإشعار بنجاح! 🚀");
        document.getElementById('notifTitle').value = "";
        document.getElementById('notifBody').value = "";
    };

    // --- نظام الـ Subscription المستمر لقائمة الأخبار العامة والأخبار المثبتة ---
    function loadPostsSubscription() {
        onSnapshot(query(collection(db, "News"), orderBy("publishDate", "desc")), (snap) => {
            const feed = document.getElementById('newsFeed');
            const pinnedArea = document.getElementById('pinnedArea');
            feed.innerHTML = ""; pinnedArea.innerHTML = "";

            snap.forEach(docSnap => {
                const post = docSnap.data();
                const postId = docSnap.id;

                if (post.pinned === true) {
                    const pinCard = document.createElement('div');
                    pinCard.className = "pin-card";
                    pinCard.onclick = () => showPostFull(postId);
                    pinCard.innerHTML = `📌 <b style="font-size:13px; color:#856404; margin-right:5px;">${post.title}</b>`;
                    pinnedArea.appendChild(pinCard);
                }

                const card = document.createElement('div');
                card.className = "post-card";
                card.onclick = () => showPostFull(postId);
                card.innerHTML = `
                    <div class="post-image-container"><img class="post-image" src="${post.img || 'logo.png'}"></div>
                    <div class="post-info">
                        <h2 class="post-title">${post.title}</h2>
                        <div class="post-meta">
                            <span>❤️ ${post.likedBy?.length || 0}</span>
                            <span>💬 ${post.comments?.length || 0}</span>
                            <span>👁️ ${post.viewedBy?.length || 0}</span>
                        </div>
                    </div>
                    ${isAdmin ? `
                    <div style="position:relative">
                        <div onclick="event.stopPropagation(); toggleDrop('${postId}')" style="padding:10px; color:#ccc">⋮</div>
                        <div id="drop-${postId}" class="dropdown">
                            <button onclick="event.stopPropagation(); delNews('${postId}')" style="color:red">🗑️ حذف</button>
                            <button onclick="event.stopPropagation(); toggleComments('${postId}', ${post.commentsDisabled})">
                                ${post.commentsDisabled ? '🔓 فتح التعليق' : '🔒 قفل التعليق'}
                            </button>
                        </div>
                    </div>` : ''}
                `;
                feed.appendChild(card);
            });
            pinnedArea.style.display = pinnedArea.innerHTML === "" ? "none" : "block";
        });
    }

    window.showPostFull = async (id) => {
        const snap = await getDoc(doc(db, "News", id));
        const post = snap.data();
        
        document.getElementById('modalBody').innerHTML = `
            ${post.img ? `<img src="${post.img}" style="width:100%; border-radius:15px; margin-bottom:15px;">` : ''}
            <h3>${post.title}</h3>
            <p style="font-size:14px; color:#444; line-height:1.7;">${post.content || post.body || ''}</p>
        `;

        const comsBox = document.getElementById('commentsContainer');
        if (post.comments?.length > 0) {
            comsBox.innerHTML = `<h4>التعليقات</h4>` + post.comments.map(c => `<div class="comment-item"><span class="comment-user">زائر العائلة</span><div class="comment-text">${c.text}</div></div>`).join('');
        } else { comsBox.innerHTML = '<p style="color:#999; font-size:12px; text-align:center;">لا توجد تعليقات</p>'; }

        const inputArea = document.getElementById('commentInputArea');
        if (post.commentsDisabled) {
            inputArea.innerHTML = '<p style="color:red; text-align:center; width:100%; font-size:12px;">🔒 التعليقات مقفلة بواسطة الإدارة</p>';
        } else {
            inputArea.innerHTML = `<input type="text" id="cInp" placeholder="اكتب تعليقاً..."><button class="comment-send-btn" onclick="addCom('${id}')">نشر</button>`;
        }
        document.getElementById('postModal').style.display = 'flex';
    };

    window.addCom = async (id) => {
        const txt = document.getElementById('cInp').value;
        if (!txt) return;
        await updateDoc(doc(db, "News", id), { comments: arrayUnion({ text: txt, date: Date.now() }) });
        showPostFull(id);
    };

    window.toggleDrop = (id) => { document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none'); document.getElementById(`drop-${id}`).style.display = 'flex'; };
    window.closeModal = () => { document.getElementById('postModal').style.display = 'none'; };
    window.delNews = async (id) => { if(confirm("حذف الخبر؟")) await deleteDoc(doc(db, "News", id)); };
    
    loadPostsSubscription();
</script>
</body>
</html>
