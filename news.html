<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أخبار العائلة | Ver: 206-7</title>
    <style>
        :root { --ios-bg: #fafafa; --card-bg: #ffffff; --ios-blue: #007AFF; }
        body { background: var(--ios-bg); font-family: -apple-system, sans-serif; margin: 0; direction: rtl; padding-bottom: 80px; }
        
        /* شريط رقم التحديث التسلسلي الجديد 206-7 لتخطي كاش المتصفح */
        .version-badge { position: fixed; top: 10px; left: 10px; font-size: 10px; background: #eee; padding: 3px 6px; border-radius: 5px; z-index: 10000; }
        
        /* شريط طلب الإشعارات العلوي */
        #notifBanner { display: none; background: #fff; padding: 15px; border-bottom: 1px solid #dbdbdb; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .notif-btn { background: var(--ios-blue); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .feed-container { max-width: 500px; margin: 0 auto; padding-top: 10px; }
        .insta-post { background: #fff; border: 1px solid #dbdbdb; margin-bottom: 20px; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 14px; }
        .avatar { width: 30px; height: 30px; background: var(--ios-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
        .post-img-wrap { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; }
        .post-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .post-content { padding: 12px; }
        .post-title { font-weight: bold; margin-bottom: 5px; display: block; }
        .post-text { font-size: 14px; color: #444; line-height: 1.5; }
        .post-date { font-size: 10px; color: #999; margin-top: 8px; display: block; }

        .floating-add { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--ios-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 15px rgba(0,122,255,0.4); text-decoration: none; z-index: 9999; }
    </style>
</head>
<body>

<div class="version-badge">Ver: 206-7</div>

<div id="notifBanner">
    <div style="font-size: 14px; font-weight: bold;">🔔 فعل التنبيهات لتصلك أخبار العائلة فوراً</div>
    <button class="notif-btn" onclick="requestPermission()">سماح بالظهور على الجوال</button>
</div>

<div class="feed-container" id="feed"></div>

<a href="add_news.html" class="floating-add">＋</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // [الربط المباشر المضمون]: نضع إعدادات مشروعك هنا مباشرة ليتصل المتصفح فوراً دون وسيط خارجي
    const firebaseConfig = {
        apiKey: "ضع_هنا_API_KEY",
        authDomain: "ضع_هنا_AUTH_DOMAIN",
        projectId: "ضع_هنا_PROJECT_ID",
        storageBucket: "ضع_هنا_STORAGE_BUCKET",
        messagingSenderId: "ضع_هنا_MESSAGING_SENDER_ID",
        appId: "ضع_هنا_APP_ID"
    };

    // تهيئة الفايربيس محلياً داخل الصفحة
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // طلب صلاحية الإشعارات وتنبيه المستخدم
    window.requestPermission = () => {
        Notification.requestPermission().then(p => {
            if(p === 'granted') {
                alert("تم تفعيل الإشعارات بنجاح! ✅");
                document.getElementById('notifBanner').style.display = 'none';
            } else {
                alert("يجب السماح بالإشعارات من إعدادات المتصفح.");
            }
        });
    };

    if (window.Notification && Notification.permission !== 'granted') {
        document.getElementById('notifBanner').style.display = 'block';
    }

    // جلب الأخبار لحظياً ومزامنتها مباشرة من جدول News
    onSnapshot(query(collection(db, "News"), orderBy("publishDate", "desc")), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        
        if(snap.empty) {
            feed.innerHTML = "<div style='text-align:center; padding:5px; color:#8e8e93; font-size:14px; margin-top:50px;'>📭 لا توجد أخبار منشورة حالياً في المنصة.</div>";
            return;
        }

        snap.forEach(docSnap => {
            const post = docSnap.data();
            const date = post.publishDate ? new Date(post.publishDate).toLocaleString('ar-SA') : "قبل قليل";
            const card = document.createElement('div');
            card.className = "insta-post";
            card.innerHTML = `
                <div class="post-header">
                    <div class="avatar">ع</div>
                    <span>أخبار العائلة</span>
                </div>
                <div class="post-img-wrap">
                    <img src="${post.img || 'logo.png'}" onerror="this.src='https://via.placeholder.com/500x500/f0f0f0/999?text=No+Image'">
                </div>
                <div class="post-content">
                    ${post.title ? `<span class="post-title">${post.title}</span>` : ''}
                    ${post.content ? `<div class="post-text">${post.content}</div>` : ''}
                    <span class="post-date">${date}</span>
                </div>
            `;
            feed.appendChild(card);
        });
    }, (error) => {
        console.error("Firestore Read Error:", error);
        document.getElementById('feed').innerHTML = "<div style='text-align:center; color:red; padding:20px;'>حدث خطأ أثناء جلب البيانات من السيرفر: " + error.message + "</div>";
    });
</script>
</body>
</html>
