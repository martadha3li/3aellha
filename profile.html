<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الملف الشخصي للإدارة | منصة العائلة</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; }
        body { background-color: var(--ios-bg); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; direction: rtl; }
        .profile-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 400px; margin: auto; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; font-size: 13px; color: #8e8e93; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; text-align: center; }
        .btn-save { width: 100%; padding: 15px; background: var(--ios-blue); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-logout { width: 100%; padding: 12px; background: none; border: 1px solid #ff3b30; color: #ff3b30; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h3>👤 تعديل الحساب الرسمي للإدارة</h3>
        <p style="color:#8e8e93; font-size:12px; margin-bottom:25px;">تغيير اسم مستخدم المدير الرسمي وكلمة المرور مباشرة</p>

        <div class="input-group">
            <label>اسم مستخدم المدير الجديد</label>
            <input type="text" id="newAdminUser">
        </div>

        <div class="input-group">
            <label>كلمة المرور الجديدة</label>
            <input type="password" id="newAdminPass" placeholder="******">
        </div>

        <button class="btn-save" id="saveBtn" onclick="saveAdminCredentials()">حفظ البيانات الجديدة</button>
        <button class="btn-logout" onclick="adminLogout()">تسجيل الخروج من الإدارة 🚪</button>
        <br><br>
        <a href="news.html" style="color:var(--ios-blue); text-decoration:none; font-size:14px; font-weight:bold;">← العودة لساحة الأخبار</a>
    </div>

    <script type="module">
        import { db } from './config.js';
        import { doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        if(localStorage.getItem('role') !== 'admin') {
            window.location.href = "news.html";
        }

        // استخدام Subscription للاستماع الحي لبيانات الأدمن وعرضها فوراً
        onSnapshot(doc(db, "AdminSettings", "credentials"), (snap) => {
            if (snap.exists()) {
                document.getElementById('newAdminUser').value = snap.data().username;
                document.getElementById('newAdminPass').value = snap.data().password;
            }
        });

        window.saveAdminCredentials = async () => {
            const newUser = document.getElementById('newAdminUser').value.trim();
            const newPass = document.getElementById('newAdminPass').value.trim();

            if(!newUser || !newPass) return alert("لا تترك الحقول فارغة");

            const btn = document.getElementById('saveBtn');
            btn.innerText = "جاري الحفظ للتأمين...";
            
            try {
                await updateDoc(doc(db, "AdminSettings", "credentials"), {
                    username: newUser,
                    password: newPass
                });
                alert("تم تحديث الحساب الموحد عبر الاشتراك اللحظي بنجاح! ✅");
            } catch (e) {
                alert("حدث خطأ أثناء التحديث");
            } finally {
                btn.innerText = "حفظ البيانات الجديدة";
            }
        };

        window.adminLogout = () => {
            localStorage.removeItem('role');
            alert("تم تسجيل خروجك وعودتك كزائر عام.");
            window.location.href = "news.html";
        };
    </script>
</body>
</html>
